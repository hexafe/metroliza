name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile check
        run: python -m compileall .

      - name: Lint (full repository)
        run: ruff check .

      - name: Unit tests
        env:
          PYTHONPATH: .
        run: python -m unittest discover -s tests -v

      - name: Smoke imports
        env:
          PYTHONPATH: .
        run: python -c "import modules.contracts; import modules.db; from modules.db import execute_many_with_retry; import modules.excel_sheet_utils; import modules.stats_utils"

  windows-smoke:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile check
        run: python -m compileall .

      - name: Unit tests
        env:
          PYTHONPATH: .
        run: python -m unittest discover -s tests -v

      - name: Install build dependencies
        run: pip install -r requirements-build.txt

      - name: Packaging sanity smoke (no artifact build)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path 'metroliza.py')) { throw 'Expected build entrypoint metroliza.py not found.' }
          if (-not (Test-Path 'metroliza_icon2.ico')) { throw 'Expected icon input metroliza_icon2.ico not found.' }
          python -m nuitka --version
          python -c "import importlib.util,sys;mods=['nuitka','PyQt6'];missing=[m for m in mods if importlib.util.find_spec(m) is None];print('missing:',missing);sys.exit(1 if missing else 0)"
