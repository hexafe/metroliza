name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile check
        run: python -m compileall .

      - name: Lint (baseline scoped)
        run: |
          ruff check \
            VersionDate.py \
            modules/AboutWindow.py \
            modules/CSVSummaryDialog.py \
            modules/contracts.py \
            modules/csv_summary_utils.py \
            modules/db.py \
            modules/excel_sheet_utils.py \
            modules/ParseReportsThread.py \
            modules/stats_utils.py \
            tests/test_contracts.py \
            tests/test_csv_summary_integration.py \
            tests/test_csv_summary_utils.py \
            tests/test_db_utils.py \
            tests/test_phase0_hotfixes.py \
            tests/test_requirements_hygiene.py

      - name: Unit tests
        run: PYTHONPATH=. python -m unittest discover -s tests -v

      - name: Smoke imports
        run: PYTHONPATH=. python -c "import modules.contracts; import modules.db; import modules.excel_sheet_utils; import modules.stats_utils"

  windows-smoke:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile check
        run: python -m compileall .

      - name: Unit tests
        run: PYTHONPATH=. python -m unittest discover -s tests -v

      - name: Install build dependencies
        run: pip install -r requirements-build.txt

      - name: Packaging sanity smoke (no artifact build)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path 'metroliza.py')) { throw 'Expected build entrypoint metroliza.py not found.' }
          if (-not (Test-Path 'metroliza_icon2.ico')) { throw 'Expected icon input metroliza_icon2.ico not found.' }
          python -m nuitka --version
          python -c "import importlib.util,sys;mods=['nuitka','PyQt6'];missing=[m for m in mods if importlib.util.find_spec(m) is None];print('missing:',missing);sys.exit(1 if missing else 0)"
