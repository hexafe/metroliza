name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_google_conversion_smoke:
        description: "Set to 1 to run release-only Google conversion smoke check"
        required: false
        default: "0"

jobs:
  python-setup:
    name: Python setup and dependency install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    needs: python-setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile check
        run: python -m compileall .

      - name: Ruff lint (full repository)
        run: ruff check .

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: python-setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unittest suite
        run: PYTHONPATH=. python -m unittest discover -s tests -v

  google-conversion-smoke:
    name: Google conversion smoke (manual/opt-in)
    runs-on: ubuntu-latest
    needs: [static-checks, unit-tests]
    if: github.event_name == 'workflow_dispatch' && inputs.run_google_conversion_smoke == '1'
    env:
      METROLIZA_RUN_GOOGLE_CONVERSION_SMOKE: ${{ inputs.run_google_conversion_smoke }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate smoke gate env flag
        run: test "${METROLIZA_RUN_GOOGLE_CONVERSION_SMOKE}" = "1"

      - name: Run Google conversion smoke check
        run: PYTHONPATH=. python tests/google_conversion_smoke.py
