name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile check
        run: python -m compileall .

      - name: Lint (baseline scoped)
        run: |
          ruff check \
            VersionDate.py \
            modules/AboutWindow.py \
            modules/CSVSummaryDialog.py \
            modules/contracts.py \
            modules/csv_summary_utils.py \
            modules/db.py \
            modules/excel_sheet_utils.py \
            modules/ParseReportsThread.py \
            modules/stats_utils.py \
            tests/test_contracts.py \
            tests/test_csv_summary_integration.py \
            tests/test_csv_summary_utils.py \
            tests/test_db_utils.py \
            tests/test_phase0_hotfixes.py \
            tests/test_requirements_hygiene.py

      - name: Unit tests
        run: PYTHONPATH=. python -m unittest discover -s tests -v

      - name: Smoke imports
        run: PYTHONPATH=. python -c "import modules.contracts; import modules.db; import modules.excel_sheet_utils; import modules.stats_utils"
