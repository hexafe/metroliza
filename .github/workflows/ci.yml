name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile check
        run: python -m compileall .

      - name: Unit tests
        run: PYTHONPATH=. python -m unittest discover -s tests -v

      - name: Smoke imports
        run: PYTHONPATH=. python -c "import modules.contracts; import modules.db; import modules.excel_sheet_utils; import modules.stats_utils"
