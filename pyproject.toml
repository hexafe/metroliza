[tool.ruff]
line-length = 100
target-version = "py311"
include = ["*.py", "*.pyi", "**/pyproject.toml"]
exclude = [
  ".git",
  ".venv",
  "artifacts",
  "__pycache__",
  "build",
  "dist",
]

[tool.ruff.lint]

[tool.ruff.lint.per-file-ignores]
"modules/chart_renderer.py" = ["E402"]
"modules/export_data_thread.py" = ["E402"]
"scripts/benchmark_paths.py" = ["E402"]
"scripts/fetch_rapidocr_models.py" = ["E402"]
"ocr_testing/header_ocr_probe.py" = ["E402"]

[tool.pytest.ini_options]
# Optional test runner normalization for contributors/tools that use pytest.
testpaths = ["tests"]
pythonpath = ["."]
markers = [
  "integration: optional tests that require external runtimes, sample files, or packaged artifacts",
]
